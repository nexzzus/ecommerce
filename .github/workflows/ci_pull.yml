# Pipeline CI para los Pull Request a dev, qa y prod

name: CI_Pull_Request

on:
    pull_request:
        branches: [dev, qa, prod]

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    lint-and-test:
        timeout-minutes: 10
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Configurar Python
              uses: actions/setup-python@v5
              with:
                python-version: "3.12"

            - name: Cache de dependencias
              uses: actions/cache@v4
              with:
                path: ~/.cache/pip
                key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
                restore-keys: |
                    ${{ runner.os }}-pip-

            - name: Instalar dependencias
              run: |
                python -m pip install --upgrade pip
                pip install -r requirements.txt
                pip install ruff pip-audit

            - name: Lint con Ruff
              run: ruff check src --output-format=github

            - name: Formato con Ruff
              run: ruff format src --check

            - name: Verificar vulnerabilidades (pip-audit)
              run: pip-audit

            - name: Pruebas (smoke test)
              run: python -c "from src.app import app; from fastapi.testclient import TestClient; c = TestClient(app); r = c.get('/'); assert r.status_code == 200; b = r.json(); assert b.get('success') is True; assert 'data' in b; print('Smoke test OK')"