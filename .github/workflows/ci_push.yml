# Pipeline CI para los Pull Request a dev, qa y prod

name: CI_Push

on:
    push:
        branches: [dev, qa, prod, fix-pipeline]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: banco_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/banco_test
      SSL_MODE: disable

    steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Configurar Python
          uses: actions/setup-python@v5
          with:
            python-version: "3.12"

        - name: Cache de dependencias
          uses: actions/cache@v4
          with:
            path: ~/.cache/pip
            key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
            restore-keys: |
                ${{ runner.os }}-pip-

        - name: Instalar dependencias
          run: |
            python -m pip install --upgrade pip
            pip install -r requirements.txt
            pip install ruff pip-audit

        - name: Crear/actualizar BD (migración)
          env:
            PYTHONPATH: src
          run: alembic upgrade head

        - name: Seed (datos iniciales)
          env:
            PYTHONPATH: src
          run: python database/seed.py

        - name: Pruebas (smoke test)
          env:
            PYTHONPATH: src
          run: python -c "from app import app; from fastapi.testclient import TestClient; c = TestClient(app); r = c.get('/'); assert r.status_code == 200; b = r.json(); assert b.get('success') is True; assert 'data' in b; print('Smoke test OK')"